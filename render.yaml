services:
  - type: web
    name: the-aspect
    runtime: node
    plan: free
    buildCommand: ""
    startCommand: node server.js
    envVars:
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_MODELS
        value: openrouter/free,google/gemma-3-27b-it:free,meta-llama/llama-3.3-70b-instruct:free,google/gemma-3-12b-it:free
